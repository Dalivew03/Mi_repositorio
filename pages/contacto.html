<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Myke Towers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top container-fluid">
        <div class="container">
            <a class="navbar-brand" href="../index.html">MYKE TOWERS</a>
            <div id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="discografia.html">Discografía</a></li>
                    <li class="nav-item"><a class="nav-link" href="tours.html">Tours</a></li>
                    <li class="nav-item"><a class="nav-link" href="biografia.html">Biografía</a></li>
                </ul>
            </div>
        </div>
    </nav>

    

    <main class="container my-5">
        <h2 class="section-title text-center mb-5">Contacto</h2>
        
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <form action="#" method="POST" class="p-4 border border-dark rounded">
                    <div class="mb-3">
                        <label for="nombre" class="form-label text-white">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-white">Correo Electrónico</label>
                        <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="mensaje" class="form-label text-white">Mensaje</label>
                        <textarea class="form-control" id="mensaje" rows="5" placeholder="¿Qué tienes que decir?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-outline-danger w-100">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </main>

    </body>
</html>
